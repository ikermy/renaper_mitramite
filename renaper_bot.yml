version: '3.9'

services:
  rnp-checker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rnp-checker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - USE_WEBHOOK=false
      - LANGUAGE=ru
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
